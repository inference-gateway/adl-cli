---
apiVersion: adl.inference-gateway.com/v1
kind: Agent
metadata:
  name: rust-agent
  description: "Minimal Rust A2A agent built with the Rust ADK"
  version: "0.1.0"
spec:
  capabilities:
    streaming: true
    pushNotifications: false
    stateTransitionHistory: false
  card:
    protocolVersion: "0.3.0"
    preferredTransport: JSONRPC
    defaultInputModes:
      - text
    defaultOutputModes:
      - text
  agent:
    provider: deepseek
    model: deepseek-v4-flash
    systemPrompt: |
      You are a helpful echo assistant. When a request mentions formatting
      (JSON, code blocks, whitespace cleanup) read the echo-formatting
      skill at skills/echo-formatting/SKILL.md first, then apply its
      guidance before invoking the echo tool.
    maxTokens: 2048
    temperature: 0.3
  config:
    tools:
      read:
        enabled: true
        max_lines: 2000
  tools:
    - id: read
    - id: echo
      name: echo
      description: "Echo a message back to the caller"
      tags:
        - echo
        - minimal
      schema:
        type: object
        properties:
          message:
            type: string
            description: "The message to echo back"
        required:
          - message
  skills:
    - id: echo-formatting
      bare: true
      name: echo-formatting
      description: "Use this when the user sends an echo request that benefits from formatting - pretty-printing JSON payloads, normalizing surrounding whitespace, or wrapping code-shaped content in fenced blocks before invoking the echo tool."
      license: Apache-2.0
      tags:
        - echo
        - formatting
  server:
    port: 8080
    scheme: http
    debug: false
    auth:
      enabled: false
  language:
    rust:
      packageName: "rust-agent"
      version: "1.94.1"
      edition: "2024"
      vendor:
        devdeps:
          - mockall@0.12.1
          - pretty_assertions@1.4.0
  development:
    sandbox:
      flox:
        enabled: true
      devcontainer:
        enabled: false
