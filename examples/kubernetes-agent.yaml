---
apiVersion: adl.inference-gateway.com/v1
kind: Agent
metadata:
  name: kubernetes-example
  description: Example A2A agent configured for Kubernetes deployment via the inference-gateway operator
  version: "1.0.0"
spec:
  capabilities:
    streaming: true
    pushNotifications: false
    stateTransitionHistory: true
  agent:
    provider: deepseek
    model: deepseek-v4-flash
    systemPrompt: |
      You are a helpful A2A agent deployed on Kubernetes.
      You can process requests and provide responses efficiently.
    maxTokens: 4000
    temperature: 0.7
  tools:
    - id: greet
      name: greet
      description: Greets the user with a personalized message
      tags:
        - greeting
        - interaction
      examples:
        - "Hello there!"
        - "Hi, how can I help you today?"
      schema:
        type: object
        properties:
          name:
            type: string
            description: The name of the person to greet
        required:
          - name
  server:
    port: 8080
    scheme: http
    debug: false
  language:
    go:
      module: github.com/example/kubernetes-example
      version: "1.26.2"
  scm:
    provider: github
    url: "https://github.com/example/kubernetes-example"
    issue_templates: true
  deployment:
    type: kubernetes
    kubernetes:
      image:
        registry: ghcr.io
        repository: example/kubernetes-example
        tag: v1.0.0
  sandbox:
    devcontainer:
      enabled: true
