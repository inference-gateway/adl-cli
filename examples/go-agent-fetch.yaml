---
apiVersion: adl.inference-gateway.com/v1
kind: Agent
metadata:
  name: go-agent-fetch
  description: "Docs-lookup agent that demonstrates the fetch built-in tool with domain whitelisting"
  version: "0.1.0"
spec:
  capabilities:
    streaming: true
    pushNotifications: false
    stateTransitionHistory: false
  card:
    protocolVersion: "0.3.0"
    preferredTransport: JSONRPC
    defaultInputModes:
      - text
    defaultOutputModes:
      - text
  agent:
    provider: deepseek
    model: deepseek-v4-flash
    systemPrompt: |
      You are a documentation-lookup assistant. When the user asks about a
      library, framework, or API, use the Fetch tool to retrieve the
      relevant page from the configured whitelist of documentation hosts,
      then summarize the answer with citations to the URL you fetched.

      You may save a fetched page under download_dir with save_path and
      then load it back with Read when the user wants to inspect a
      specific section.

      Only fetch URLs that fall under the configured allow-list. If the
      user requests a host that is not allowed, explain the restriction
      instead of attempting the call.
    maxTokens: 4096
    temperature: 0.3
  config:
    tools:
      read:
        enabled: true
        max_lines: 2000
      fetch:
        enabled: true
        # AllowedDomains accepts exact hosts and ".suffix" entries that
        # match any subdomain. An empty list would mean "any host" - we
        # intentionally pin to a curated set of documentation sources.
        allowed_domains:
          - pkg.go.dev
          - docs.python.org
          - .rust-lang.org # matches doc.rust-lang.org, blog.rust-lang.org, etc.
          - raw.githubusercontent.com
        # 5 MiB cap is plenty for typical documentation pages and keeps a
        # misbehaving model from exhausting memory.
        max_bytes: 5242880
        timeout_seconds: 20
        # Enable save_path so the agent can cache pages it wants to
        # revisit with Read. download_dir scopes where writes can land.
        allow_downloads: true
        download_dir: /tmp/adl-fetch-cache
  tools:
    - id: read
    - id: fetch
  skills:
    - id: docs-lookup
      bare: true
      name: docs-lookup
      description: "Use this when the user asks about a library, framework, or API. Identify the canonical docs URL on the whitelist, fetch it, optionally save it under download_dir for follow-ups, and summarize with a citation. Decline politely if the requested host is not whitelisted."
      license: MIT
      tags:
        - documentation
        - lookup
        - research
  server:
    port: 8080
    scheme: http
    debug: false
    auth:
      enabled: false
  language:
    go:
      module: "github.com/inference-gateway/adl-cli/test-output"
      version: "1.26.2"
  development:
    sandbox:
      flox:
        enabled: true
      devcontainer:
        enabled: false
