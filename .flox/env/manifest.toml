schema-version = "1.11.0"

[install]
go.pkg-path = "go"
go.version = "^1.26.2"
claude-code.pkg-path = "claude-code"
claude-code.version = "^2.1.141"
golangci-lint.pkg-path = "golangci-lint"
golangci-lint.version = "^2.12.2"
goreleaser.pkg-path = "goreleaser"
goreleaser.version = "^2.15.4"
go-task.pkg-path = "go-task"
go-task.version = "^3.48.0"
prettier.pkg-path = "prettier"
prettier.version = "^3.6.2"
markdownlint-cli.pkg-path = "markdownlint-cli"
markdownlint-cli.version = "0.48.0"
infer.flake = "github:inference-gateway/cli/v0.109.11"
adl.flake = "github:inference-gateway/adl-cli/v0.28.0"

[hook]
on-activate = """
  export GOENV="$FLOX_ENV_CACHE/goenv"
  export PATH="$(go env GOPATH)/bin:$PATH"
  go get .

  source <(goreleaser completion zsh)
  source <(task --completion zsh)
"""
