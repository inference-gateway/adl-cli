version = 1

[install]
go.pkg-path = "go"
go.version = "^1.25.5"
claude-code.pkg-path = "claude-code"
claude-code.version = "^2.1.15"
golangci-lint.pkg-path = "golangci-lint"
golangci-lint.version = "^2.8.0"
goreleaser.pkg-path = "goreleaser"
goreleaser.version = "^2.13.3"
go-task.pkg-path = "go-task"
go-task.version = "^3.45.5"
prettier.pkg-path = "prettier"
prettier.version = "^3.6.2"

[hook]
on-activate = """
  export GOENV="$FLOX_ENV_CACHE/goenv"
  export PATH="$(go env GOPATH)/bin:$PATH"
  go get .

  if [ ! -f "$(go env GOPATH)/bin/infer" ]; then
    curl -sSL https://raw.githubusercontent.com/inference-gateway/cli/main/install.sh | bash -s -- --install-dir "$(go env GOPATH)/bin"
  fi

  source <(goreleaser completion zsh)
  source <(task --completion zsh)
"""
